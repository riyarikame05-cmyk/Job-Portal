<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Portal Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>JobPortal</h2>

    <a href="#">🏠 Dashboard</a>
    <a href="#">💼 Jobs</a>
    <a href="#">➕ Post Job</a>
    <a href="#">👤 Profile</a>

    <button onclick="logout()">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1>Welcome 👋</h1>
    <p>Manage jobs, applications and postings</p>

    <!-- STATS -->
    <div class="cards">
      <div class="card">Total Jobs <span id="totalJobs">0</span></div>
      <div class="card">Applications <span>25</span></div>
      <div class="card">Interviews <span>8</span></div>
      <div class="card">Profile Views <span>56</span></div>
    </div>

    <!-- JOB FORM -->
    <div class="form-box">
      <h2>Post New Job</h2>

      <input id="title" placeholder="Job Title"/>
      <input id="company" placeholder="Company"/>
      <input id="location" placeholder="Location"/>
      <input id="salary" placeholder="Salary"/>
      <textarea id="description" placeholder="Description"></textarea>

      <button onclick="postJob()">Post Job</button>
    </div>

    <!-- JOB TABLE -->
    <div class="table-box">
      <h2>Latest Jobs</h2>

      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Title</th>
            <th>Location</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="jobTableBody"></tbody>
      </table>
    </div>

  </main>
</div>

<script src="dashboard.js"></script>

<script>
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}
</script>

</body>
</html>
